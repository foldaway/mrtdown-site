name: Sync production to main

on:
  push:
    branches:
      - production
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-main:
    name: Sync production to main
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    steps:
      - name: Checkout production
        uses: actions/checkout@v6
        with:
          ref: production
          fetch-depth: 0

      - name: Push production to main
        run: |
          set -euo pipefail

          git push origin HEAD:main
