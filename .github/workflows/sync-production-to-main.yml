name: Sync production to main

on:
  push:
    branches:
      - production
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  open-sync-pr:
    name: Open production → main sync PR
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    steps:
      - name: Create pull request from production to main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          existing_pr_count="$(gh pr list \
            --base main \
            --head production \
            --state open \
            --json number \
            --jq 'length')"

          if [ "$existing_pr_count" -gt 0 ]; then
            echo "Open production -> main PR already exists; skipping creation."
            exit 0
          fi

          gh pr create \
            --base main \
            --head production \
            --title "chore: sync production into main" \
            --body "Automated sync PR to bring \`main\` (staging) up to date with \`production\`."
