name: Deploy Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

jobs:
  deploy:
    name: Deploy preview
    runs-on: ubuntu-latest
    # pull_request workflows from forks do not receive repository secrets
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.deployment-url }}
    concurrency:
      group: deploy-preview-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8
        with:
          replace_slashes_with_hyphens: 'true'

      - name: Build
        run: npm run build
        env:
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
          VITE_ROOT_URL: "https://www.mrtdown.org"

      - name: Create preview.env
        run: |-
          echo "VITE_ROOT_URL=https://www.mrtdown.org" >> preview.env

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          command: versions upload --preview-alias "${{ steps.branch_name.outputs.current_branch }}" --secrets-file preview.env
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Remove preview.env
        run: rm preview.env
