name: Deploy Preview

on:
  push:
    branches:
      - preview
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy preview
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: https://preview.mrtdown.org
    concurrency:
      group: deploy-preview-shared-database
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reset and migrate preview database
        run: npm run db:preview:prepare
        env:
          ALLOW_DATABASE_RESET: "true"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1
      - run: |-
          flyctl deploy \
            --config fly.preview.toml \
            --local-only \
            --build-arg TIER=preview \
            --build-arg SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --image-label=${{ github.sha }} \
            --build-arg SENTRY_ORG=${{ secrets.SENTRY_ORG }} \
            --build-arg SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }} \
            --build-secret SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }} \
            --build-arg SENTRY_RELEASE=${{ github.sha }} \
            --build-arg VITE_PUBLIC_POSTHOG_KEY=${{ secrets.VITE_PUBLIC_POSTHOG_KEY }} \
            --build-arg VITE_PUBLIC_POSTHOG_HOST=${{ secrets.VITE_PUBLIC_POSTHOG_HOST }} \
            --build-arg VITE_ROOT_URL=https://preview.mrtdown.org
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Sync preview QStash schedules
        run: npm run qstash:schedules:sync
        env:
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          QSTASH_URL: ${{ secrets.QSTASH_URL }}
          TIER: preview
          VITE_ROOT_URL: https://preview.mrtdown.org

      - name: Queue preview pull workflow
        run: |-
          curl --fail-with-body \
            -X POST \
            -H "Authorization: Bearer $INTERNAL_API_TOKEN" \
            https://preview.mrtdown.org/internal/api/tasks/pull
        env:
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
