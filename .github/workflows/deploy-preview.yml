name: Deploy Preview

on:
  push:
    branches:
      - preview
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy preview
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.deployment-url }}
    concurrency:
      group: deploy-preview-shared-database
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reset and migrate preview database
        run: npm run db:preview:prepare
        env:
          ALLOW_DATABASE_RESET: "true"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build
        run: npm run build
        env:
          CLOUDFLARE_ENV: preview
          GIT_SHA: ${{ github.sha }}
          TIER: preview
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
          VITE_ROOT_URL: "https://www.mrtdown.org"

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          command: deploy --env preview
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run preview pull workflow
        timeout-minutes: 30
        run: |-
          set -euo pipefail

          instance_id="$(uuidgen)"
          npx wrangler workflows trigger mrtdown-pull-preview --id "$instance_id"

          while true; do
            output="$(npx wrangler workflows instances describe mrtdown-pull-preview "$instance_id" --step-output=false)"
            echo "$output"

            status="$(echo "$output" | sed -n 's/^Status:[[:space:]]*//p')"
            case "$status" in
              *Completed*)
                exit 0
                ;;
              *Errored*|*Terminated*)
                exit 1
                ;;
            esac

            sleep 30
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

