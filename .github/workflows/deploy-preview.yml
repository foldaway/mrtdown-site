name: Deploy Preview

on:
  push:
    branches:
      - preview
  workflow_dispatch:

jobs:
  deploy:
    if: github.ref == 'refs/heads/preview'
    name: Deploy preview
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.deployment-url }}
    concurrency:
      group: deploy-preview-shared-database
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject preview D1 database ID
        run: npm run cf:prepare-d1-config
        env:
          CLOUDFLARE_ENV: preview
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}

      - name: Apply D1 migrations
        run: npm run db:migrate -- --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build
        run: npm run build
        env:
          CLOUDFLARE_ENV: preview
          GIT_SHA: ${{ github.sha }}
          TIER: preview
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
          VITE_ROOT_URL: "https://www.mrtdown.org"

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          command: deploy --env preview
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run preview public holidays workflow
        timeout-minutes: 15
        run: |-
          set -euo pipefail

          instance_id="$(uuidgen)"
          npx wrangler workflows trigger mrtdown-public-holidays-preview --env preview --id "$instance_id"

          while true; do
            output="$(npx wrangler workflows instances describe mrtdown-public-holidays-preview "$instance_id" --env preview --step-output=false)"
            echo "$output"

            status="$(echo "$output" | sed -n 's/^Status:[[:space:]]*//p')"
            case "$status" in
              *Completed*)
                exit 0
                ;;
              *Errored*|*Terminated*)
                exit 1
                ;;
            esac

            sleep 30
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run preview pull workflow
        timeout-minutes: 30
        run: |-
          set -euo pipefail

          instance_id="$(uuidgen)"
          npx wrangler workflows trigger mrtdown-pull-preview --env preview --id "$instance_id"

          while true; do
            output="$(npx wrangler workflows instances describe mrtdown-pull-preview "$instance_id" --env preview --step-output=false)"
            echo "$output"

            status="$(echo "$output" | sed -n 's/^Status:[[:space:]]*//p')"
            case "$status" in
              *Completed*)
                exit 0
                ;;
              *Errored*|*Terminated*)
                exit 1
                ;;
            esac

            sleep 30
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Check preview D1 readiness
        run: npm run d1:check-readiness -- preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_MIN_LINES: ${{ vars.D1_MIN_LINES }}
          D1_MIN_STATIONS: ${{ vars.D1_MIN_STATIONS }}
          D1_MIN_SERVICES: ${{ vars.D1_MIN_SERVICES }}
          D1_MIN_SERVICE_REVISIONS: ${{ vars.D1_MIN_SERVICE_REVISIONS }}
          D1_MIN_PUBLIC_HOLIDAYS: ${{ vars.D1_MIN_PUBLIC_HOLIDAYS }}
          D1_MIN_LINE_DAY_FACTS: ${{ vars.D1_MIN_LINE_DAY_FACTS }}
          D1_MIN_STATISTICS_SNAPSHOTS: ${{ vars.D1_MIN_STATISTICS_SNAPSHOTS }}

      - name: Check preview D1 routes
        run: npm run perf:routes -- "$DEPLOYMENT_URL"
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          PROBES: all
          SAMPLES: 1
