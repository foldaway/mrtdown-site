name: Deploy

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate-staging:
    if: github.ref == 'refs/heads/main'
    name: Migrate staging database
    runs-on: ubuntu-latest
    environment:
      name: staging
    concurrency:
      group: migrate-staging
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-staging:
    if: github.ref == 'refs/heads/main'
    name: Deploy staging
    needs: migrate-staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.mrtdown.org
    concurrency:
      group: deploy-staging-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - run: |-
          flyctl deploy \
            --config fly.staging.toml \
            --local-only \
            --image-label=${{ github.sha }} \
            --build-arg TIER=staging \
            --build-arg SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --build-arg SENTRY_ORG=${{ secrets.SENTRY_ORG }} \
            --build-arg SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }} \
            --build-secret SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }} \
            --build-arg SENTRY_RELEASE=${{ github.sha }} \
            --build-arg VITE_PUBLIC_POSTHOG_KEY=${{ secrets.VITE_PUBLIC_POSTHOG_KEY }} \
            --build-arg VITE_PUBLIC_POSTHOG_HOST=${{ secrets.VITE_PUBLIC_POSTHOG_HOST }} \
            --build-arg VITE_ROOT_URL=https://staging.mrtdown.org
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Sync staging QStash schedules
        run: npm run qstash:schedules:sync
        env:
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          QSTASH_URL: ${{ secrets.QSTASH_URL }}
          TIER: staging
          VITE_ROOT_URL: https://staging.mrtdown.org

  migrate-production:
    if: github.ref == 'refs/heads/production'
    name: Migrate production database
    runs-on: ubuntu-latest
    concurrency:
      group: migrate-production
      cancel-in-progress: false
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-production:
    if: github.ref == 'refs/heads/production'
    name: Deploy production
    needs: migrate-production
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    environment:
      name: production
      url: https://www.mrtdown.org
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - run: |-
          flyctl deploy \
            --config fly.production.toml \
            --local-only \
            --build-arg TIER=production \
            --build-arg SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --image-label=${{ github.sha }} \
            --build-arg SENTRY_ORG=${{ secrets.SENTRY_ORG }} \
            --build-arg SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }} \
            --build-secret SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }} \
            --build-arg SENTRY_RELEASE=${{ github.sha }} \
            --build-arg VITE_PUBLIC_POSTHOG_KEY=${{ secrets.VITE_PUBLIC_POSTHOG_KEY }} \
            --build-arg VITE_PUBLIC_POSTHOG_HOST=${{ secrets.VITE_PUBLIC_POSTHOG_HOST }} \
            --build-arg VITE_ROOT_URL=https://www.mrtdown.org
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Sync production QStash schedules
        run: npm run qstash:schedules:sync
        env:
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          QSTASH_URL: ${{ secrets.QSTASH_URL }}
          TIER: production
          VITE_ROOT_URL: https://www.mrtdown.org
