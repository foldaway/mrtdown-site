name: Deploy

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate-staging:
    if: github.ref == 'refs/heads/main'
    name: Migrate staging database
    runs-on: ubuntu-latest
    environment:
      name: staging
    concurrency:
      group: migrate-staging
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations
        run: npm run db:migrate -- --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-staging:
    if: github.ref == 'refs/heads/main'
    name: Deploy staging
    needs: migrate-staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.deployment-url }}
    concurrency:
      group: deploy-staging-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify staging D1 cutover readiness
        run: |-
          set -euo pipefail

          if [ "${D1_CUTOVER_READY}" != "true" ]; then
            echo "::error::Set the staging D1_CUTOVER_READY environment variable to true only after the canonical pull has completed, public holidays have synced, and route checks have passed against the staging D1 database."
            exit 1
          fi
        env:
          D1_CUTOVER_READY: ${{ vars.D1_CUTOVER_READY }}

      - name: Check staging D1 readiness
        run: npm run d1:check-readiness -- staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_MIN_LINES: ${{ vars.D1_MIN_LINES }}
          D1_MIN_STATIONS: ${{ vars.D1_MIN_STATIONS }}
          D1_MIN_SERVICES: ${{ vars.D1_MIN_SERVICES }}
          D1_MIN_SERVICE_REVISIONS: ${{ vars.D1_MIN_SERVICE_REVISIONS }}
          D1_MIN_PUBLIC_HOLIDAYS: ${{ vars.D1_MIN_PUBLIC_HOLIDAYS }}
          D1_MIN_LINE_DAY_FACTS: ${{ vars.D1_MIN_LINE_DAY_FACTS }}
          D1_MIN_STATISTICS_SNAPSHOTS: ${{ vars.D1_MIN_STATISTICS_SNAPSHOTS }}

      - name: Build
        run: npm run build
        env:
          CLOUDFLARE_ENV: staging
          GIT_SHA: ${{ github.sha }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          TIER: staging
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
          VITE_ROOT_URL: "https://www.mrtdown.org"

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          command: deploy --env staging
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Check staging D1 routes
        run: npm run perf:routes -- "$DEPLOYMENT_URL"
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          PROBES: all
          SAMPLES: 1

      - name: Print deployment URL
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: echo $DEPLOYMENT_URL

  migrate-production:
    if: github.ref == 'refs/heads/production'
    name: Migrate production database
    runs-on: ubuntu-latest
    concurrency:
      group: migrate-production
      cancel-in-progress: false
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production preflight
        run: npm run build
        env:
          # Used by the Cloudflare Vite plugin for wrangler env key https://developers.cloudflare.com/workers/vite-plugin/reference/cloudflare-environments/
          CLOUDFLARE_ENV: production
          GIT_SHA: ${{ github.sha }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          TIER: production
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
          VITE_ROOT_URL: "https://www.mrtdown.org"

      - name: Validate production deploy bundle
        run: npx wrangler deploy --env production --dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations
        run: npm run db:migrate -- --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-production:
    if: github.ref == 'refs/heads/production'
    name: Deploy production
    needs: migrate-production
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify production D1 cutover readiness
        run: |-
          set -euo pipefail

          if [ "${D1_CUTOVER_READY}" != "true" ]; then
            echo "::error::Set the production D1_CUTOVER_READY environment variable to true only after the no-import site-local checks have passed, the canonical pull has completed, public holidays have synced, and route checks have passed against the production D1 database."
            exit 1
          fi
        env:
          D1_CUTOVER_READY: ${{ vars.D1_CUTOVER_READY }}

      - name: Check production D1 readiness
        run: npm run d1:check-readiness -- production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_MIN_LINES: ${{ vars.D1_MIN_LINES }}
          D1_MIN_STATIONS: ${{ vars.D1_MIN_STATIONS }}
          D1_MIN_SERVICES: ${{ vars.D1_MIN_SERVICES }}
          D1_MIN_SERVICE_REVISIONS: ${{ vars.D1_MIN_SERVICE_REVISIONS }}
          D1_MIN_PUBLIC_HOLIDAYS: ${{ vars.D1_MIN_PUBLIC_HOLIDAYS }}
          D1_MIN_LINE_DAY_FACTS: ${{ vars.D1_MIN_LINE_DAY_FACTS }}
          D1_MIN_STATISTICS_SNAPSHOTS: ${{ vars.D1_MIN_STATISTICS_SNAPSHOTS }}

      - name: Build
        run: npm run build
        env:
          # Used by the Cloudflare Vite plugin for wrangler env key https://developers.cloudflare.com/workers/vite-plugin/reference/cloudflare-environments/
          CLOUDFLARE_ENV: production
          GIT_SHA: ${{ github.sha }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          TIER: production
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
          VITE_ROOT_URL: "https://www.mrtdown.org"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        id: deploy
        with:
          command: deploy --env production
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Check production D1 routes
        run: npm run perf:routes -- "$DEPLOYMENT_URL"
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          PROBES: all
          SAMPLES: 1
