services:
  postgres:
    # Workaround for arm64 support: https://github.com/postgis/docker-postgis/issues/216#issuecomment-981824739
    image: ghcr.io/baosystems/postgis:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mrtdown-db
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
